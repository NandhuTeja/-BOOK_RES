name: Book Recommender CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Step 1: Lint & Validate ─────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run data validation
        run: python src/data_validation.py

  # ─── Step 2: Train Model ─────────────────────────────────────
  train:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏋️ Run training pipeline
        run: python src/train.py --no-mlflow --no-cv

      - name: 📤 Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.pkl

  # ─── Step 3: Build Docker Image ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: 🐳 Build Docker image
        run: docker build -t book-recommender:latest .

      - name: ✅ Verify Docker image
        run: docker images book-recommender
